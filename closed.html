<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Article 19 MUN | Registration Soon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#01081A;
      --bg2:#02112B;
      --accent:#0EA5E9;
      --accent2:#7DD3FC;
      --text:#F0F9FF;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'Montserrat', sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 20% 20%, rgba(14,165,233,.16), transparent 28%),
        radial-gradient(circle at 80% 80%, rgba(125,211,252,.10), transparent 32%),
        linear-gradient(180deg, var(--bg) 0%, var(--bg2) 100%);
      display: grid;
      place-items: center;
      position: relative;
    }

    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image: radial-gradient(rgba(255,255,255,.04) 1px, transparent 1px);
      background-size: 24px 24px;
      opacity: .18;
      pointer-events: none;
    }

    .glow {
      position: absolute;
      width: 560px;
      height: 560px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(14,165,233,.18), transparent 64%);
      filter: blur(30px);
      animation: float 8s ease-in-out infinite alternate;
      pointer-events: none;
    }

    .card {
      position: relative;
      z-index: 1;
      padding: 34px 28px;
      border-radius: 28px;
      border: 1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.04);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      box-shadow:
        0 18px 50px rgba(0,0,0,.45),
        0 0 34px rgba(14,165,233,.14);
      text-align: center;
      max-width: 92vw;
    }

    h1 {
      font-size: clamp(2rem, 5vw, 4rem);
      font-weight: 900;
      letter-spacing: 1px;
      line-height: 1.1;
      background: linear-gradient(180deg, #fff, #BEE7FF, #7DD3FC);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 24px rgba(14,165,233,.18);
    }

    @keyframes float {
      from { transform: translate3d(-18px, -14px, 0) scale(1); }
      to   { transform: translate3d(18px, 14px, 0) scale(1.08); }
    }
  </style>
</head>
<body>
  <div class="glow"></div>
  <div class="card">
    <h1>Applications Closed</h1>
  </div>
</body>
</html>
